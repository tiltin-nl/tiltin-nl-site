<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Tiltin | Amsterdam</title>
  <meta name="description" content="Tiltin is based in Amsterdam. Contact Tiltin for more information." />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="https://tiltin.nl/" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Tiltin | Amsterdam" />
  <meta property="og:description" content="Tiltin is based in Amsterdam. Contact Tiltin for more information." />
  <meta property="og:url" content="https://tiltin.nl/" />

  <style>
    :root {
      --accent: #59e7cf;
      --panel-bg: rgba(255, 255, 255, 0.88);
      --text-dark: #222;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
      background: #0f0f0f;
    }

    body {
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(0,0,0,0.10), rgba(0,0,0,0.18)),
        url("https://images.unsplash.com/photo-1534351590666-13e3e96b5017?auto=format&fit=crop&w=1800&q=80");
      background-position: center center;
      background-size: cover;
      background-repeat: no-repeat;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: flex-start;
    }

    .sidebar {
      width: 380px;
      max-width: 92vw;
      background: var(--panel-bg);
      color: var(--text-dark);
      padding: 30px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      backdrop-filter: blur(8px);
    }

    .brand-card {
      background: var(--accent);
      color: white;
      padding: 28px 24px;
      margin-bottom: 28px;
    }

    .brand-card .name {
      font-size: 56px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: lowercase;
    }

    .brand-card .sub {
      margin-top: 10px;
      font-size: 20px;
      letter-spacing: 4px;
      text-transform: lowercase;
    }

    .intro {
      margin: 0 0 24px;
      font-size: 15px;
      line-height: 1.6;
    }

    .contact-list {
      display: grid;
      gap: 18px;
    }

    .contact-item {
      line-height: 1.45;
      font-size: 17px;
    }

    .label {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.7;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .footer {
      margin-top: 28px;
      font-size: 13px;
      line-height: 1.5;
      opacity: 0.72;
    }

    @media (max-width: 820px) {
      .page {
        align-items: flex-end;
      }

      .sidebar {
        width: 100%;
        max-width: 100%;
      }

      body {
        background-attachment: scroll;
      }
    }
  </style>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Tiltin",
    "url": "https://tiltin.nl/",
    "email": "contact@tiltin.com",
    "telephone": "+31203080070",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "Herengracht 518",
      "postalCode": "1017CC",
      "addressLocality": "Amsterdam",
      "addressCountry": "NL"
    }
  }
  </script>
</head>
<body>
  <main class="page">
    <aside class="sidebar">
      <section>
        <div class="brand-card">
          <div class="name">tiltin</div>
          <div class="sub">ventures</div>
        </div>

        <p class="intro">
          Tiltin is based in Amsterdam. This is the first live holding page for the new tiltin.nl setup.
        </p>

        <div class="contact-list">
          <div class="contact-item">
            <span class="label">Address</span>
            Herengracht 518<br />
            1017CC Amsterdam
          </div>

          <div class="contact-item">
            <span class="label">Phone</span>
            <a href="tel:+31203080070">+31(0) 203 080 070</a>
          </div>

          <div class="contact-item">
            <span class="label">Email</span>
            <a href="mailto:contact@tiltin.com">contact@tiltin.com</a>
          </div>

          <div class="contact-item">
            <span class="label">Website</span>
            <a href="https://tiltin.nl/">www.tiltin.nl</a>
          </div>
        </div>
      </section>

      <footer class="footer">
        2018 All rights reserved Tiltin BV<br />
        Registration 34355822
      </footer>
    </aside>
  </main>
</body>
</html>
