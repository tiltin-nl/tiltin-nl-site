  <style>
    :root {
      --brand: #49d8d0;
      --panel-bg: rgba(255, 255, 255, 0.72);
      --panel-border: rgba(255, 255, 255, 0.42);
      --text: #2d3338;
      --muted: rgba(45, 51, 56, 0.78);
      --shadow: 0 16px 48px rgba(0, 0, 0, 0.16);
      --radius: 26px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Manrope", system-ui, sans-serif;
      background: #f3f3f3;
      color: var(--text);
    }

    body {
      background-image: url("/homepage.webp");
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
    }

    .page {
      width: 100%;
      height: 100%;
      display: flex;
      padding: 18px;
    }

    .sidebar {
      width: 320px;
      max-width: calc(100vw - 36px);
      max-height: calc(100vh - 36px);
      padding: 18px;
      border-radius: var(--radius);
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: hidden;
    }

    .brand-card {
      background: var(--brand);
      color: #fff;
      border-radius: 10px;
      padding: 18px 20px;
    }

    .brand-name {
      margin: 0;
      font-family: "Outfit", sans-serif;
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 0.92;
      text-transform: lowercase;
    }

    .brand-tag {
      margin: 10px 0 0;
      font-family: "Outfit", sans-serif;
      font-size: 18px;
      font-weight: 500;
      line-height: 1.08;
      letter-spacing: -0.02em;
    }

    .contact-list {
      display: grid;
      gap: 18px;
    }

    .contact-item {
      display: grid;
      gap: 3px;
    }

    .contact-text {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
      font-weight: 500;
    }

    .contact-text a {
      color: inherit;
      text-decoration: none;
    }

    .contact-text a:hover {
      text-decoration: underline;
    }

    .divider {
      height: 1px;
      background: rgba(45, 51, 56, 0.13);
      margin-top: 2px;
    }

    .legal {
      margin-top: auto;
      font-size: 13px;
      line-height: 1.35;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      html,
      body {
        overflow: auto;
      }

      .page {
        min-height: 100vh;
        height: auto;
        padding: 14px;
        align-items: flex-end;
      }

      .sidebar {
        width: 100%;
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <aside class="sidebar" aria-label="Company information">
      <section class="brand-card" aria-label="Brand">
        <h1 class="brand-name">tiltin</h1>
        <p class="brand-tag">venture for impact</p>
      </section>

      <section class="contact-list" aria-label="Contact details">
        <div class="contact-item">
          <p class="contact-text">Herengracht 518<br>1017 CC Amsterdam</p>
        </div>

        <div class="contact-item">
          <p class="contact-text"><a href="tel:+31203080070">+31 (0)20 308 0070</a></p>
        </div>

        <div class="contact-item">
          <p class="contact-text"><a href="mailto:contact@tiltin.nl">contact@tiltin.nl</a></p>
        </div>

        <div class="contact-item">
          <p class="contact-text"><a href="https://tiltin.nl/">www.tiltin.nl</a></p>
        </div>
      </section>

      <div class="divider" aria-hidden="true"></div>

      <section class="legal" aria-label="Legal information">
        <div>2026 Tiltin BV</div>
        <div>Registration 34355822</div>
      </section>
    </aside>
  </main>
</body>
