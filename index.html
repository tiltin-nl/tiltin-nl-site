<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>tiltin | Amsterdam-based venture firm</title>
  <meta name="description" content="tiltin is an Amsterdam-based venture firm focused on building, backing, and advancing impactful ventures." />
  <meta name="robots" content="index,follow,max-image-preview:large" />
  <link rel="canonical" href="https://tiltin.nl/" />

  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --brand: #49d8d0;
      --panel-bg: rgba(255, 255, 255, 0.72);
      --panel-border: rgba(255, 255, 255, 0.42);
      --text: #2d3338;
      --muted: rgba(45, 51, 56, 0.78);
      --shadow: 0 16px 48px rgba(0, 0, 0, 0.16);
      --radius: 26px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Manrope", system-ui, sans-serif;
      background: #f3f3f3;
    }

    body {
      background-image: url("/homepage.webp");
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
    }

    .page {
      width: 100%;
      height: 100%;
      display: flex;
      padding: 18px;
    }

    .sidebar {
      width: 320px; /* reduced from 370 */
      max-width: calc(100vw - 36px);
      max-height: calc(100vh - 36px);
      padding: 18px;
      border-radius: var(--radius);
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .brand-card {
      background: var(--brand);
      color: #fff;
      border-radius: 10px;
      padding: 18px 20px;
    }

    .brand-name {
      margin: 0;
      font-family: "Outfit", sans-serif;
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .brand-tag {
      margin: 10px 0 0;
      font-family: "Outfit", sans-serif;
      font-size: 18px;
      font-weight: 500;
    }

    .contact-list { display: grid; gap: 12px; }

    .contact-item {
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 12px;
      align-items: center;
    }

    .icon-box {
      width: 48px;
      height: 48px;
      background: var(--brand);
      border-radius: 10px;
      display: grid;
      place-items: center;
      color: white;
    }

    .icon-box svg { width: 22px; height: 22px; }

    .contact-text {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
    }

    .legal {
      margin-top: auto;
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      html, body { overflow: auto; }
      .sidebar { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="page">

    <aside class="sidebar">
      <section class="brand-card">
        <h1 class="brand-name">tiltin</h1>
        <p class="brand-tag">venture for impact</p>
      </section>

      <div class="contact-list">
        <div class="contact-item">
          <div class="icon-box">📍</div>
          <p class="contact-text">Herengracht 518<br>1017 CC Amsterdam</p>
        </div>

        <div class="contact-item">
          <div class="icon-box">📞</div>
          <p class="contact-text">+31 (0)20 308 0070</p>
        </div>

        <div class="contact-item">
          <div class="icon-box">✉️</div>
          <p class="contact-text">contact@tiltin.nl</p>
        </div>

        <div class="contact-item">
          <div class="icon-box">🌐</div>
          <p class="contact-text">www.tiltin.nl</p>
        </div>
      </div>

      <div class="legal">
        2026 Tiltin BV<br>
        Registration 34355822
      </div>
    </aside>

  </main>
</body>
</html>
