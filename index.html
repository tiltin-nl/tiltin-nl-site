  <style>
    :root {
      --brand: #46d9d0;
      --panel-bg: rgba(255, 255, 255, 0.74);
      --panel-border: rgba(255, 255, 255, 0.4);
      --text: #2f3439;
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.18);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: #f3f3f3;
    }

    body {
      min-height: 100vh;
      background-image: url("/homepage.webp");
      background-position: center center;
      background-repeat: no-repeat;
      background-size: cover;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: flex-start;
      padding: 26px;
    }

    .sidebar {
      width: 440px;
      max-width: calc(100vw - 52px);
      padding: 28px;
      border-radius: var(--radius);
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      gap: 26px;
    }

    .brand-card {
      background: var(--brand);
      color: #fff;
      border-radius: 10px;
      padding: 28px 30px;
    }

    .brand-name {
      margin: 0;
      font-size: clamp(54px, 5vw, 90px);
      line-height: 0.92;
      font-weight: 700;
      text-transform: lowercase;
      letter-spacing: 0;
    }

    .brand-tag {
      margin: 18px 0 0;
      font-size: clamp(18px, 2vw, 27px);
      line-height: 1.1;
      font-weight: 400;
    }

    .contact-list {
      display: grid;
      gap: 18px;
    }

    .contact-item {
      display: grid;
      grid-template-columns: 72px 1fr;
      align-items: center;
      column-gap: 18px;
    }

    .icon-box {
      width: 72px;
      height: 72px;
      border-radius: 10px;
      background: var(--brand);
      display: grid;
      place-items: center;
      color: #fff;
    }

    .icon-box svg {
      width: 34px;
      height: 34px;
      display: block;
      fill: currentColor;
    }

    .contact-text {
      margin: 0;
      font-size: clamp(18px, 2vw, 25px);
      line-height: 1.38;
      color: var(--text);
      word-break: break-word;
    }

    .contact-text a {
      color: inherit;
      text-decoration: none;
    }

    .contact-text a:hover {
      text-decoration: underline;
    }

    .divider {
      height: 1px;
      background: rgba(47, 52, 57, 0.14);
      margin-top: 2px;
    }

    .legal {
      margin-top: auto;
      display: grid;
      gap: 6px;
      font-size: 17px;
      line-height: 1.35;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
      white-space: nowrap;
    }

    @media (max-width: 900px) {
      .page {
        padding: 16px;
        align-items: flex-end;
      }

      .sidebar {
        width: 100%;
        max-width: 100%;
        padding: 20px;
        border-radius: 24px;
        gap: 18px;
      }

      .brand-card {
        padding: 22px;
      }

      .contact-item {
        grid-template-columns: 58px 1fr;
        column-gap: 14px;
      }

      .icon-box {
        width: 58px;
        height: 58px;
      }

      .icon-box svg {
        width: 28px;
        height: 28px;
      }

      .legal {
        font-size: 15px;
      }
    }
  </style>
